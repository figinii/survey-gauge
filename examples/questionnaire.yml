preamble: 
  Read the statement and respond with the appropriate number to indicate how you feel right now, 
  that is, at this very moment. There are no right or wrong answers. Do not spend too much time on 
  the statement but give the answer which seems to describe your present feelings best.
default_choices:
  - almost never
  - occasionally
  - often
  - almost always
