preamble: 
  Classify the description based on how the experience is framed
  egocentric = the experience is presented as lived from within, as if the narrator is the one undergoing it
  allocentric = the experience is attributed to a person who is being described
default_choices:
  - choice: egocentric
    score: 0
  - choice: allocentric
    score: 1
failure_indicator: 'N/A'
